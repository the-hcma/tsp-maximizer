name: CI

on:
  # Omitting push: main — the merge queue already validates the integrated
  # state before landing; a second run after merge duplicates work without
  # adding signal.
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip merge-queue branches — the merge queue validates the integrated
          # state itself; CI there duplicates work without adding signal.
          if [[ "${{ github.head_ref }}" == gtmq_merge_* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          pr_number="${{ github.event.pull_request.number }}"
          if [[ -n "$pr_number" ]]; then
            state=$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json state -q .state)
            if [[ "$state" == "MERGED" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check + lint + format
        run: pnpm run check

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install gitleaks
      run: |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        FALLBACK_VERSION=8.30.0
        VERSION=$(curl -sf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        VERSION=${VERSION:-$FALLBACK_VERSION}
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_${ARCH}.tar.gz" \
          | tar -xz gitleaks
        sudo mv gitleaks /usr/local/bin/

    - name: Scan for leaked secrets
      run: |
        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="${{ github.event.pull_request.head.sha }}"
        if [ -n "$BASE" ] && [ -n "$HEAD" ]; then
          gitleaks detect --source . --log-opts "${BASE}..${HEAD}"
        else
          gitleaks detect --source .
        fi
